<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h3 class="logo-text">SmartPay AI</h3>
      <p class="subtitle">Create your account to get started</p>

      <form id="signupForm">
        <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
        <input type="email" class="form-control" id="email" placeholder="Email Address" required>
        <input type="tel" class="form-control" id="phoneNumber" placeholder="Phone Number" pattern="[0-9]{10}" required>
        <input type="password" class="form-control" id="password" placeholder="Password" minlength="6" required>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" minlength="6" required>
        <button type="submit" class="btn btn-smartpay w-100 mt-2">Create Account</button>
      </form>

      <div class="auth-footer-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
