<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-smartpay">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">SmartPay AI</a>
      <div class="ms-auto">
        <a class="nav-link logout-btn text-white" href="#" role="button">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container py-5" style="max-width: 600px;">
    <div class="card-smartpay p-4">
      <h4 class="fw-bold mb-4">My Profile</h4>
      <form id="profileForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" disabled>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phoneNumber" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Profile Picture URL</label>
          <input type="text" class="form-control" id="profilePicture" placeholder="Optional">
        </div>
        <button type="submit" class="btn btn-smartpay">Save Changes</button>
        <a href="dashboard.html" class="btn btn-outline-smartpay ms-2">Back to Dashboard</a>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      requireAuth();
      const { data } = await apiRequest('/user/profile');
      if (data?.success) {
        document.getElementById('fullName').value = data.user.full_name;
        document.getElementById('email').value = data.user.email;
        document.getElementById('phoneNumber').value = data.user.phone_number;
        document.getElementById('profilePicture').value = data.user.profile_picture || '';
      }
    });

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        fullName: document.getElementById('fullName').value.trim(),
        phoneNumber: document.getElementById('phoneNumber').value.trim(),
        profilePicture: document.getElementById('profilePicture').value.trim()
      };
      const { status, data } = await apiRequest('/user/profile', 'PUT', payload);
      if (status === 200 && data.success) {
        showToast('Profile updated successfully.', 'success');
      } else {
        showToast(data.message || 'Update failed.', 'danger');
      }
    });
  </script>
</body>
</html>
