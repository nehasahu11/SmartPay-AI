<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-smartpay">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">SmartPay AI</a>
      <div class="ms-auto">
        <a class="nav-link logout-btn text-white" href="#" role="button">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar-smartpay">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">📊 Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="recharge.html">📱 Recharge</a></li>
          <li class="nav-item"><a class="nav-link" href="bills.html">🧾 Bill Payments</a></li>
          <li class="nav-item"><a class="nav-link active" href="analytics.html">📈 Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">👤 Profile</a></li>
        </ul>
      </div>

      <div class="col-md-10 py-4">
        <h3 class="fw-bold mb-4">Spending Analytics</h3>

        <div class="row g-4">
          <div class="col-md-7">
            <div class="chart-container">
              <h5 class="mb-3">Monthly Spending Trend</h5>
              <canvas id="monthlyTrendChart" height="250"></canvas>
            </div>
          </div>
          <div class="col-md-5">
            <div class="chart-container">
              <h5 class="mb-3">Category-wise Spending</h5>
              <canvas id="categoryPieChart" height="250"></canvas>
            </div>
          </div>
          <div class="col-md-12">
            <div class="chart-container">
              <h5 class="mb-3">Recharge vs Bill Payments</h5>
              <canvas id="rechargeVsBillChart" height="120"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/charts.js"></script>
</body>
</html>
