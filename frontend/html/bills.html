<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Payments - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-smartpay">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">SmartPay AI</a>
      <div class="ms-auto">
        <a class="nav-link logout-btn text-white" href="#" role="button">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar-smartpay">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">📊 Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="recharge.html">📱 Recharge</a></li>
          <li class="nav-item"><a class="nav-link active" href="bills.html">🧾 Bill Payments</a></li>
          <li class="nav-item"><a class="nav-link" href="analytics.html">📈 Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">👤 Profile</a></li>
        </ul>
      </div>

      <div class="col-md-10 py-4">
        <h3 class="fw-bold mb-4">Bill Payments</h3>

        <div class="row g-4">
          <div class="col-md-5">
            <div class="card-smartpay p-4 mb-4">
              <form id="billForm">
                <div class="mb-3">
                  <label class="form-label">Bill Type</label>
                  <select class="form-select" id="billType" required>
                    <option value="electricity">Electricity</option>
                    <option value="water">Water</option>
                    <option value="gas">Gas</option>
                    <option value="broadband">Broadband</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Provider Name</label>
                  <input type="text" class="form-control" id="providerName" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Consumer Number</label>
                  <input type="text" class="form-control" id="consumerNumber" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Billing Month</label>
                  <input type="month" class="form-control" id="billingMonth" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Due Date</label>
                  <input type="date" class="form-control" id="dueDate" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Amount (₹)</label>
                  <input type="number" step="0.01" min="1" class="form-control" id="amount" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Payment Method</label>
                  <select class="form-select" id="paymentMethod" required>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Net Banking">Net Banking</option>
                    <option value="Wallet">Wallet</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-smartpay w-100">Pay Bill</button>
              </form>
            </div>

            <div class="card-smartpay p-4">
              <h6 class="fw-bold mb-3">AI Bill Prediction</h6>
              <select class="form-select mb-3" id="predictBillType">
                <option value="electricity">Electricity</option>
                <option value="water">Water</option>
                <option value="gas">Gas</option>
                <option value="broadband">Broadband</option>
              </select>
              <button class="btn btn-outline-smartpay w-100" id="predictBillBtn">Predict Next Bill</button>
              <div id="predictionResult" class="mt-3"></div>
            </div>
          </div>

          <div class="col-md-7">
            <div class="chart-container">
              <h5 class="mb-3">Bill Payment History</h5>
              <table class="table table-hover">
                <thead>
                  <tr><th>Type</th><th>Provider</th><th>Consumer No.</th><th>Date</th><th>Status</th></tr>
                </thead>
                <tbody id="billHistoryTable">
                  <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="voice-btn" id="voiceAssistantBtn" title="Voice Assistant">🎙️</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/bills.js"></script>
  <script src="../js/voiceAssistant.js"></script>
</body>
</html>
