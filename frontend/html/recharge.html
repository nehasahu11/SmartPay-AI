<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recharge - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-smartpay">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">SmartPay AI</a>
      <div class="ms-auto">
        <a class="nav-link logout-btn text-white" href="#" role="button">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar-smartpay">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">📊 Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="recharge.html">📱 Recharge</a></li>
          <li class="nav-item"><a class="nav-link" href="bills.html">🧾 Bill Payments</a></li>
          <li class="nav-item"><a class="nav-link" href="analytics.html">📈 Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">👤 Profile</a></li>
        </ul>
      </div>

      <div class="col-md-10 py-4">
        <h3 class="fw-bold mb-4">Recharge</h3>

        <div class="row g-4">
          <div class="col-md-5">
            <div class="card-smartpay p-4">
              <form id="rechargeForm">
                <div class="mb-3">
                  <label class="form-label">Recharge Type</label>
                  <select class="form-select" id="rechargeType" required>
                    <option value="mobile">Mobile</option>
                    <option value="dth">DTH</option>
                    <option value="fastag">Fastag</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Operator</label>
                  <input type="text" class="form-control" id="operatorName" placeholder="e.g. Jio, Airtel" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Account / Mobile / DTH / Fastag Number</label>
                  <input type="text" class="form-control" id="accountNumber" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Plan Details (optional)</label>
                  <input type="text" class="form-control" id="planDetails" placeholder="e.g. 28 days, 2GB/day">
                </div>
                <div class="mb-3">
                  <label class="form-label">Amount (₹)</label>
                  <input type="number" step="0.01" min="1" class="form-control" id="amount" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Payment Method</label>
                  <select class="form-select" id="paymentMethod" required>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Net Banking">Net Banking</option>
                    <option value="Wallet">Wallet</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-smartpay w-100">Recharge Now</button>
              </form>
            </div>
          </div>

          <div class="col-md-7">
            <div class="chart-container">
              <h5 class="mb-3">Recharge History</h5>
              <table class="table table-hover">
                <thead>
                  <tr><th>Type</th><th>Operator</th><th>Number</th><th>Date</th><th>Status</th></tr>
                </thead>
                <tbody id="rechargeHistoryTable">
                  <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="voice-btn" id="voiceAssistantBtn" title="Voice Assistant">🎙️</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/recharge.js"></script>
  <script src="../js/voiceAssistant.js"></script>
</body>
</html>
