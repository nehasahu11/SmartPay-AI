<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - SmartPay AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h3 class="logo-text">SmartPay AI</h3>
      <p class="subtitle">Reset your password</p>

      <form id="forgotForm">
        <input type="email" class="form-control" id="email" placeholder="Registered Email" required>
        <button type="submit" class="btn btn-smartpay w-100 mt-2">Generate Reset Token</button>
      </form>

      <div id="resetSection" class="mt-4 d-none">
        <hr>
        <p class="small text-muted">In a production system this token would be emailed. For this academic demo, it's shown below.</p>
        <form id="resetForm">
          <input type="text" class="form-control" id="resetTokenDisplay" placeholder="Reset Token" required>
          <input type="password" class="form-control" id="newPassword" placeholder="New Password" minlength="6" required>
          <button type="submit" class="btn btn-smartpay w-100 mt-2">Reset Password</button>
        </form>
      </div>

      <div class="auth-footer-link">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
